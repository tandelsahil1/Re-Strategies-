<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lindner BIM Viewer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#06080d;
      color:#eaf0ff;
      font-family:"Inter",system-ui,sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .topbar {
      height:52px;
      background:rgba(13,16,24,0.98);
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center;
      padding:0 20px; gap:14px;
      flex-shrink:0;
    }
    .brand {
      font-size:0.95rem; font-weight:900;
      background:linear-gradient(135deg,#79f5dc,#5ea7ff);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .divider { width:1px; height:20px; background:rgba(255,255,255,0.1); }
    .top-title { font-size:0.82rem; color:#aab3c6; font-weight:600; }
    .top-actions { margin-left:auto; display:flex; gap:8px; }
    .btn {
      padding:7px 14px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:#eaf0ff; font-size:0.8rem; font-weight:700;
      cursor:pointer; transition:all 0.15s;
      display:inline-flex; align-items:center; gap:6px;
      text-decoration:none;
    }
    .btn:hover { background:rgba(94,167,255,0.15); border-color:rgba(94,167,255,0.4); }
    .btn-primary {
      background:linear-gradient(135deg,rgba(94,167,255,0.25),rgba(121,245,220,0.18));
      border-color:rgba(94,167,255,0.45);
    }
    .back { color:#aab3c6; text-decoration:none; font-size:0.8rem; font-weight:600; }
    .back:hover { color:#eaf0ff; }
    .main { flex:1; display:flex; overflow:hidden; }
    .sidebar {
      width:280px; background:rgba(13,16,24,0.98);
      border-right:1px solid rgba(255,255,255,0.06);
      display:flex; flex-direction:column;
    }
    .sb-section { padding:14px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .sb-title {
      font-size:0.7rem; font-weight:800; color:#aab3c6;
      text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;
    }
    .upload-zone {
      border:2px dashed rgba(94,167,255,0.3);
      border-radius:10px; padding:20px;
      text-align:center; cursor:pointer; transition:all 0.2s;
    }
    .upload-zone:hover { border-color:rgba(94,167,255,0.6); background:rgba(94,167,255,0.05); }
    .upload-zone.drag { border-color:#79f5dc; background:rgba(121,245,220,0.08); }
    .upload-icon { font-size:2rem; margin-bottom:6px; }
    .upload-text { font-size:0.8rem; color:#aab3c6; line-height:1.4; }
    .upload-text b { color:#5ea7ff; }
    .file-pill {
      display:none;
      background:rgba(121,245,220,0.08);
      border:1px solid rgba(121,245,220,0.25);
      border-radius:8px; padding:10px 12px; font-size:0.78rem;
    }
    .file-pill.show { display:block; }
    .file-pill .fn { font-weight:700; color:#79f5dc; }
    .file-pill .fs { color:#aab3c6; font-size:0.72rem; margin-top:2px; }
    .sb-scroll { flex:1; overflow-y:auto; padding:14px; }
    .sb-empty { text-align:center; color:#aab3c6; font-size:0.78rem; padding:20px 0; }
    .prop-row {
      display:flex; justify-content:space-between;
      padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04);
      font-size:0.76rem; gap:8px;
    }
    .pk { color:#aab3c6; }
    .pv { color:#eaf0ff; font-weight:600; text-align:right; word-break:break-word; }
    .sec-head { font-weight:800; font-size:0.82rem; color:#79f5dc; margin:10px 0 6px; }
    .room-item {
      padding:8px 10px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.06);
      margin-bottom:4px; cursor:pointer;
      font-size:0.78rem; transition:all 0.15s;
      display:flex; align-items:center; gap:8px;
    }
    .room-item:hover { background:rgba(94,167,255,0.08); }
    .room-item.sel { background:rgba(121,245,220,0.1); border-color:rgba(121,245,220,0.4); }
    .room-name { font-weight:700; color:#eaf0ff; }
    .room-meta { color:#aab3c6; font-size:0.7rem; }
    .floor-label {
      font-weight:800; font-size:0.78rem;
      color:#5ea7ff; margin:10px 0 6px;
      padding-bottom:4px; border-bottom:1px solid rgba(94,167,255,0.2);
    }
    .import-wrap { padding:12px 14px; border-top:1px solid rgba(255,255,255,0.06); }
    .import-btn {
      display:none; width:100%; padding:10px;
      background:linear-gradient(135deg,rgba(121,245,220,0.2),rgba(94,167,255,0.15));
      border:1px solid rgba(121,245,220,0.4);
      border-radius:10px; color:#eaf0ff;
      font-weight:800; font-size:0.85rem;
      cursor:pointer; transition:all 0.2s;
    }
    .import-btn.show { display:block; }
    .import-btn:hover { transform:translateY(-1px); }
    .viewer-wrap { flex:1; position:relative; overflow:hidden; }
    #viewer-container { width:100%; height:100%; }
    .empty {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; pointer-events:none;
    }
    .empty.hide { display:none; }
    .empty-icon { font-size:4rem; opacity:0.2; }
    .empty-title { font-size:1rem; font-weight:800; opacity:0.4; }
    .empty-sub { font-size:0.78rem; color:#aab3c6; opacity:0.4; text-align:center; max-width:240px; }
    .loading {
      position:absolute; inset:0;
      background:rgba(6,8,13,0.92);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:14px; backdrop-filter:blur(8px); z-index:50;
    }
    .loading.hide { display:none; }
    .spin {
      width:40px; height:40px;
      border:3px solid rgba(94,167,255,0.2);
      border-top-color:#5ea7ff; border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .load-title { font-size:0.9rem; font-weight:700; }
    .load-sub { font-size:0.76rem; color:#aab3c6; }
    .statusbar {
      height:26px; background:rgba(13,16,24,0.98);
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex; align-items:center;
      padding:0 16px; gap:10px;
      font-size:0.7rem; color:#aab3c6;
    }
    .dot { width:6px; height:6px; border-radius:50%; background:#aab3c6; }
    .dot.g { background:#79f5dc; }
    .dot.y { background:#ffd080; }
    .dot.r { background:#ff6b6b; }
    .toast {
      position:fixed; bottom:40px; left:50%;
      transform:translateX(-50%);
      background:rgba(121,245,220,0.15);
      border:1px solid rgba(121,245,220,0.4);
      border-radius:12px; padding:10px 20px;
      font-size:0.82rem; font-weight:700; color:#79f5dc;
      z-index:9999; display:none;
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="./index.html" class="back">← Back</a>
  <div class="divider"></div>
  <div class="brand">🏗️ Lindner BIM Viewer</div>
  <div class="divider"></div>
  <div class="top-title" id="topTitle">No file loaded</div>
  <div class="top-actions">
    <button class="btn" id="btnFit">⊡ Fit</button>
    <button class="btn" id="btnClip">✂️ Clip</button>
    <label class="btn btn-primary" for="ifcIn">📂 Open IFC</label>
    <input type="file" id="ifcIn" accept=".ifc,.IFC" style="display:none">
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">📁 IFC File</div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">🏗️</div>
        <div class="upload-text"><b>Drop IFC here</b><br>or click to browse</div>
      </div>
      <div class="file-pill" id="filePill">
        <div class="fn" id="fName"></div>
        <div class="fs" id="fSize"></div>
      </div>
    </div>
    <div class="sb-scroll" id="sbScroll">
      <div class="sb-empty">
        <div style="font-size:2rem;margin-bottom:8px;">🏢</div>
        Load an IFC file to see<br>floors and rooms
      </div>
    </div>
    <div class="import-wrap">
      <button class="import-btn" id="importBtn">🚀 Import Rooms to LCA Tool</button>
    </div>
  </div>

  <div class="viewer-wrap">
    <div id="viewer-container"></div>
    <div class="empty" id="emptyEl">
      <div class="empty-icon">🏗️</div>
      <div class="empty-title">No IFC File Loaded</div>
      <div class="empty-sub">Open an IFC file to view your building model in 3D</div>
    </div>
    <div class="loading hide" id="loadEl">
      <div class="spin"></div>
      <div class="load-title">Loading IFC Model...</div>
      <div class="load-sub" id="loadSub">Please wait...</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="dot" id="sDot"></div>
  <span id="sTxt">Ready — Open an IFC file</span>
  <span style="margin-left:auto">That Open Engine • web-ifc</span>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.160.0/",
    "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.53/web-ifc-api.js",
    "@thatopen/components": "https://cdn.jsdelivr.net/npm/@thatopen/components@2.4.0/+esm",
    "@thatopen/fragments": "https://cdn.jsdelivr.net/npm/@thatopen/fragments@2.4.0/+esm"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import * as OBC from "@thatopen/components";

// ── DOM ──────────────────────────────────────
const topTitle  = document.getElementById('topTitle');
const uploadZone= document.getElementById('uploadZone');
const filePill  = document.getElementById('filePill');
const fName     = document.getElementById('fName');
const fSize     = document.getElementById('fSize');
const sbScroll  = document.getElementById('sbScroll');
const emptyEl   = document.getElementById('emptyEl');
const loadEl    = document.getElementById('loadEl');
const loadSub   = document.getElementById('loadSub');
const importBtn = document.getElementById('importBtn');
const sDot      = document.getElementById('sDot');
const sTxt      = document.getElementById('sTxt');
const toast     = document.getElementById('toast');
const container = document.getElementById('viewer-container');

// ── State ────────────────────────────────────
let components = null;
let world = null;
let fragmentIfcLoader = null;
let currentModel = null;
let ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
let selectedRooms = new Set();

// ── Helpers ──────────────────────────────────
const setStatus = (dot, txt) => {
  sDot.className = 'dot' + (dot ? ` ${dot}` : '');
  sTxt.textContent = txt;
};
const showLoad = (show, msg='') => {
  loadEl.classList.toggle('hide', !show);
  if (msg) loadSub.textContent = msg;
};
const fmt = b => b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
const showToast = msg => {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display='none', 3000);
};
const row = (k, v) => `<div class="prop-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;

// ── Init TOE Viewer ──────────────────────────
async function initViewer() {
  try {
    setStatus('y', 'Initializing viewer...');
    
    components = new OBC.Components();
    
    const worlds = components.get(OBC.Worlds);
    world = worlds.create();
    
    world.scene = new OBC.SimpleScene(components);
    world.renderer = new OBC.SimpleRenderer(components, container);
    world.camera = new OBC.SimpleCamera(components);
    
    components.init();
    
    world.scene.setup();
    world.scene.three.background = new THREE.Color(0x0a0e1a);
    
    // Grid
    const grids = components.get(OBC.Grids);
    grids.create(world);
    
    // Camera position
    world.camera.controls.setLookAt(15, 15, 15, 0, 0, 0);
    
    // IFC Loader
    fragmentIfcLoader = components.get(OBC.IfcLoader);
    await fragmentIfcLoader.setup();
    
    // Configure web-ifc
    fragmentIfcLoader.settings.wasm = {
      path: "https://cdn.jsdelivr.net/npm/web-ifc@0.0.53/",
      absolute: true,
    };
    
    // Highlighter for clicking
    const highlighter = components.get(OBC.Highlighter);
    highlighter.setup({ world });
    
    highlighter.events.select.onHighlight.add((data) => {
      const keys = Object.keys(data);
      if (keys.length > 0) {
        showElementProps(keys[0], data[keys[0]]);
      }
    });
    
    setStatus('g', 'Viewer ready — Open an IFC file');
  } catch(err) {
    console.error('Viewer init error:', err);
    setStatus('r', `❌ Init failed: ${err.message}`);
    throw err;
  }
}

// ── Load IFC ─────────────────────────────────
async function loadIFC(file) {
  if (!components) await initViewer();
  
  if (currentModel) {
    world.scene.three.remove(currentModel);
    currentModel = null;
  }
  
  showLoad(true, 'Parsing IFC file...');
  emptyEl.classList.add('hide');
  setStatus('y', `Loading ${file.name}...`);
  
  try {
    const buffer = await file.arrayBuffer();
    const data = new Uint8Array(buffer);
    
    showLoad(true, 'Building geometry...');
    
    currentModel = await fragmentIfcLoader.load(data);
    currentModel.name = file.name;
    world.scene.three.add(currentModel);
    
    showLoad(true, 'Extracting properties...');
    await extractData();
    
    showLoad(false);
    
    // Fit camera
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    
    world.camera.controls.setLookAt(
      center.x + maxDim * 1.2,
      center.y + maxDim * 0.8,
      center.z + maxDim * 1.2,
      center.x, center.y, center.z
    );
    
    fName.textContent = file.name;
    fSize.textContent = fmt(file.size);
    filePill.classList.add('show');
    uploadZone.style.display = 'none';
    topTitle.textContent = file.name;
    
    renderSidebar();
    importBtn.classList.add('show');
    
    setStatus('g', `✅ ${file.name} loaded — ${ifcData.spaces.length} rooms found`);
    
  } catch(err) {
    showLoad(false);
    setStatus('r', `❌ ${err.message}`);
    console.error('Load error:', err);
  }
}

// ── Extract IFC Data ─────────────────────────
async function extractData() {
  ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
  
  if (!currentModel) return;
  
  // Get fragment properties
  const props = currentModel.properties || {};
  
  for (const id in props) {
    const item = props[id];
    if (!item || !item.type) continue;
    
    const type = item.type;
    const name = item.Name?.value || item.LongName?.value || `Item ${id}`;
    
    // IFC type constants
    if (type === 3124254112) { // IFCBUILDINGSTOREY
      ifcData.floors.push({ id, name });
    } else if (type === 3856911033) { // IFCSPACE
      ifcData.spaces.push({ id, name, parent: '' });
    } else if (type === 2391406946 || type === 477021311) { // IFCWALL / WALLSTANDARDCASE
      ifcData.walls.push({ id, name });
    } else if (type === 1529196076) { // IFCSLAB
      ifcData.slabs.push({ id, name });
    }
  }
  
  console.log('Extracted:', ifcData);
}

// ── Show Element Properties ──────────────────
function showElementProps(fragmentID, ids) {
  if (!currentModel || !currentModel.properties) return;
  
  const expressID = Array.isArray(ids) ? ids[0] : [...ids][0];
  const props = currentModel.properties[expressID];
  
  if (!props) return;
  
  let html = `<div class="sec-head">📦 ${props.Name?.value || 'Element'}</div>`;
  html += row('Type', getTypeName(props.type));
  html += row('ID', expressID);
  
  for (const [k, v] of Object.entries(props)) {
    if (k === 'type' || k === 'expressID') continue;
    if (v?.value !== undefined) {
      html += row(k, String(v.value));
    }
  }
  
  sbScroll.innerHTML = html;
}

function getTypeName(type) {
  const types = {
    3124254112: 'IfcBuildingStorey',
    3856911033: 'IfcSpace',
    2391406946: 'IfcWall',
    477021311:  'IfcWallStandardCase',
    1529196076: 'IfcSlab',
  };
  return types[type] || `Type ${type}`;
}

// ── Render Sidebar ───────────────────────────
function renderSidebar() {
  const { floors, spaces, walls, slabs } = ifcData;
  let html = '';
  
  html += `<div class="sec-head">🏢 Model Summary</div>`;
  html += row('Floors', floors.length);
  html += row('Spaces', spaces.length);
  html += row('Walls', walls.length);
  html += row('Slabs', slabs.length);
  
  if (floors.length > 0 || spaces.length > 0) {
    html += `<div class="sec-head" style="margin-top:14px;">🏬 Floors & Spaces</div>`;
    html += `<div style="font-size:0.7rem;color:#aab3c6;margin-bottom:8px;">Select rooms to import</div>`;
    
    if (floors.length > 0) {
      for (const floor of floors) {
        html += `<div class="floor-label">📐 ${floor.name}</div>`;
        for (const sp of spaces) {
          const sel = selectedRooms.has(sp.id);
          html += `
            <div class="room-item ${sel?'sel':''}" onclick="window.toggleRoom('${sp.id}')">
              <span>${sel?'✅':'⬜'}</span>
              <div>
                <div class="room-name">${sp.name}</div>
                <div class="room-meta">IfcSpace #${sp.id}</div>
              </div>
            </div>`;
        }
        break;
      }
    } else if (spaces.length > 0) {
      html += `<div class="floor-label">📐 Ground Floor</div>`;
      for (const sp of spaces) {
        const sel = selectedRooms.has(sp.id);
        html += `
          <div class="room-item ${sel?'sel':''}" onclick="window.toggleRoom('${sp.id}')">
            <span>${sel?'✅':'⬜'}</span>
            <div>
              <div class="room-name">${sp.name}</div>
              <div class="room-meta">IfcSpace #${sp.id}</div>
            </div>
          </div>`;
      }
    }
  }
  
  sbScroll.innerHTML = html;
  updateImportBtn();
}

window.toggleRoom = id => {
  selectedRooms.has(id) ? selectedRooms.delete(id) : selectedRooms.add(id);
  renderSidebar();
};

function updateImportBtn() {
  const n = selectedRooms.size;
  importBtn.textContent = n > 0
    ? `🚀 Import ${n} Room${n>1?'s':''} to LCA Tool`
    : `🚀 Import All Rooms to LCA Tool`;
}

// ── Import to LCA ────────────────────────────
importBtn.addEventListener('click', () => {
  const spaces = selectedRooms.size > 0
    ? ifcData.spaces.filter(s => selectedRooms.has(s.id))
    : ifcData.spaces;
  
  if (spaces.length === 0) {
    showToast('⚠️ No rooms to import');
    return;
  }
  
  const floors = ifcData.floors.length > 0
    ? ifcData.floors
    : [{ id:'f0', name:'Ground Floor' }];
  
  const payload = {
    type: 'IFC_IMPORT',
    building: {
      name: topTitle.textContent.replace(/\.ifc$/i,'') || 'IFC Building',
      location: '',
      projectType: 'office',
      floors: floors.map((floor, fi) => ({
        id: `floor-ifc-${fi}`,
        name: floor.name,
        rooms: spaces.map((sp, ri) => ({
          id: `room-ifc-${fi}-${ri}`,
          name: sp.name,
          dims: { length: 5, width: 5, height: 2.7 },
          fromIFC: true,
          ifcId: sp.id
        }))
      }))
    }
  };
  
  localStorage.setItem('lindner-ifc-import', JSON.stringify(payload));
  showToast(`✅ Importing ${spaces.length} rooms...`);
  setTimeout(() => { window.location.href = './index.html?from=ifc'; }, 1200);
});

// ── Toolbar ──────────────────────────────────
document.getElementById('btnFit').onclick = () => {
  if (!currentModel || !world) return;
  const box = new THREE.Box3().setFromObject(currentModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  world.camera.controls.setLookAt(
    center.x + maxDim * 1.2,
    center.y + maxDim * 0.8,
    center.z + maxDim * 1.2,
    center.x, center.y, center.z
  );
};

document.getElementById('btnClip').onclick = () => {
  if (!components || !world) return;
  const clipper = components.get(OBC.Clipper);
  clipper.enabled = !clipper.enabled;
  if (clipper.enabled) showToast('✂️ Click on model to add clip plane');
};

// ── File Input ───────────────────────────────
document.getElementById('ifcIn').onchange = e => {
  if (e.target.files[0]) loadIFC(e.target.files[0]);
};
uploadZone.onclick = () => document.getElementById('ifcIn').click();
uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('drag'); };
uploadZone.ondragleave = () => uploadZone.classList.remove('drag');
uploadZone.ondrop = e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f?.name.toLowerCase().endsWith('.ifc')) loadIFC(f);
};

// ── Start ────────────────────────────────────
initViewer().catch(err => {
  console.error('Init error:', err);
  setStatus('r', `❌ Init failed: ${err.message}`);
});
</script>
</body>
</html>
