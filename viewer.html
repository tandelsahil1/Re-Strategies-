<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lindner BIM Viewer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#06080d;
      color:#eaf0ff;
      font-family:"Inter",system-ui,sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .topbar {
      height:52px;
      background:rgba(13,16,24,0.98);
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center;
      padding:0 20px; gap:14px;

    }
    .brand {
      font-size:0.95rem; font-weight:900;
      background:linear-gradient(135deg,#79f5dc,#5ea7ff);
      -webkit-background-clip:text; background-clip:text;

    }
    .divider { width:1px; height:20px; background:rgba(255,255,255,0.1); }
    .top-title { font-size:0.82rem; color:#aab3c6; font-weight:600; }
    .top-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .btn {
      padding:7px 14px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:#eaf0ff; font-size:0.8rem; font-weight:700;
      cursor:pointer; transition:all 0.15s;
      display:inline-flex; align-items:center; gap:6px;

    .btn:hover { background:rgba(94,167,255,0.15); border-color:rgba(94,167,255,0.4); }
    .btn-primary {
      background:linear-gradient(135deg,rgba(94,167,255,0.25),rgba(121,245,220,0.18));
      border-color:rgba(94,167,255,0.45);
    }
    .back { color:#aab3c6; text-decoration:none; font-size:0.8rem; font-weight:600; display:flex; align-items:center; gap:5px; }
    .back:hover { color:#eaf0ff; }
    .main { flex:1; display:flex; overflow:hidden; }
    .sidebar {
      width:270px; background:rgba(13,16,24,0.98);
      border-right:1px solid rgba(255,255,255,0.06);
      display:flex; flex-direction:column; flex-shrink:0;
    }
    .sb-section { padding:14px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .sb-title {
      font-size:0.7rem; font-weight:800; color:#aab3c6;

    .upload-zone.drag { border-color:#79f5dc; background:rgba(121,245,220,0.08); }

    .upload-text b { color:#5ea7ff; }

      display:none;

    .room-item.sel { background:rgba(121,245,220,0.1); border-color:rgba(121,245,220,0.4); }

    .prop-row {

    .pk { color:#aab3c6; flex-shrink:0; }

    .viewer-wrap { flex:1; position:relative; overflow:hidden; }
    #three-canvas { width:100%; height:100%; display:block; background:#0a0e1a; }
    .empty {

      position:absolute; inset:0;

    .statusbar {
      height:26px; background:rgba(13,16,24,0.98);

      display:flex; align-items:center;

    .dot { width:6px; height:6px; border-radius:50%; background:#aab3c6; }
    .dot.g { background:#79f5dc; }
    .dot.y { background:#ffd080; }
    .dot.r { background:#ff6b6b; }
    .toast {
      position:fixed; bottom:40px; left:50%;
      transform:translateX(-50%);
      background:rgba(121,245,220,0.15);
      border:1px solid rgba(121,245,220,0.4);
      border-radius:12px; padding:10px 20px;

  </style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js",
    "web-ifc-three/IFCLoader.js": "https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.125/IFCLoader.js",
    "web-ifc": "https://cdn.jsdelivr.net/npm/web-ifc@0.0.44/web-ifc-api.js"
  }

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
import { IFCLoader } from "web-ifc-three/IFCLoader.js";
import {
  IFCBUILDINGSTOREY,
  IFCSPACE,
  IFCWALL,
  IFCWALLSTANDARDCASE,
  IFCSLAB
} from "web-ifc";

// ── DOM ──────────────────────────────────────────────────────
const topTitle  = document.getElementById('topTitle');
const uploadZone= document.getElementById('uploadZone');
const filePill  = document.getElementById('filePill');
const fName     = document.getElementById('fName');
const fSize     = document.getElementById('fSize');
const sbScroll  = document.getElementById('sbScroll');
const emptyEl   = document.getElementById('emptyEl');
const loadEl    = document.getElementById('loadEl');
const loadSub   = document.getElementById('loadSub');
const importBtn = document.getElementById('importBtn');
const sDot      = document.getElementById('sDot');
const sTxt      = document.getElementById('sTxt');
const toast     = document.getElementById('toast');
const canvas    = document.getElementById('three-canvas');

// ── State ─────────────────────────────────────────────────────
let scene, camera, renderer, controls, ifcLoader;
let ifcModel = null;
let modelID  = null;
let currentFile = null;
let ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
let selectedRooms = new Set();
let isWireframe = false;
let isXray = false;
let originalMaterials = new Map();

// ── Helpers ───────────────────────────────────────────────────
const setStatus = (dot, txt) => {
  sDot.className = 'dot' + (dot ? ` ${dot}` : '');
  sTxt.textContent = txt;
};
const showLoad = (show, msg='') => {
  loadEl.classList.toggle('hide', !show);
  if (msg) loadSub.textContent = msg;
};
const fmt = b => b < 1048576
  ? (b/1024).toFixed(1)+' KB'
  : (b/1048576).toFixed(1)+' MB';
const showToast = msg => {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display='none', 3000);
};

// ── Init Three.js Scene ───────────────────────────────────────
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e1a);

  const rect = canvas.getBoundingClientRect();
  camera = new THREE.PerspectiveCamera(60, rect.width / rect.height, 0.1, 5000);
  camera.position.set(15, 15, 15);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(rect.width, rect.height, false);
  renderer.shadowMap.enabled = true;

  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(ambient);

  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(10, 20, 10);
  dir.castShadow = true;
  scene.add(dir);

  const dir2 = new THREE.DirectionalLight(0x6090ff, 0.35);
  dir2.position.set(-10, 10, -10);
  scene.add(dir2);

  // Grid
  const grid = new THREE.GridHelper(50, 50, 0x224466, 0x112233);
  scene.add(grid);

  // Axes
  const axes = new THREE.AxesHelper(3);
  scene.add(axes);

  // IFC Loader
  ifcLoader = new IFCLoader();
  ifcLoader.ifcManager.setWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.44/");

  // Resize
  window.addEventListener('resize', onResize);
  onResize();

  animate();
  setStatus('g', 'Viewer ready — Open an IFC file');
}

function onResize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  camera.aspect = rect.width / rect.height;
  camera.updateProjectionMatrix();
  renderer.setSize(rect.width, rect.height, false);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ── Load IFC ──────────────────────────────────────────────────
async function loadIFC(file) {
  if (!scene) initScene();
  if (ifcModel) {
    scene.remove(ifcModel);
    ifcModel.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
    ifcModel = null;
    originalMaterials.clear();
  }

  currentFile = file;
  showLoad(true, 'Parsing IFC geometry...');
  emptyEl.classList.add('hide');
  setStatus('y', `Loading ${file.name}...`);

  try {
    const url = URL.createObjectURL(file);
    ifcModel = await ifcLoader.loadAsync(url, prog => {
      if (prog.total) {
        const pct = ((prog.loaded / prog.total) * 100).toFixed(0);
        showLoad(true, `Loading geometry... ${pct}%`);
      }
    });
    URL.revokeObjectURL(url);

    modelID = ifcModel.modelID;
    scene.add(ifcModel);

    // Save original materials for x-ray toggling
    ifcModel.traverse(obj => {
      if (obj.isMesh) {
        originalMaterials.set(obj.uuid, obj.material);
      }
    });

    fitCameraToObject(ifcModel);

    fName.textContent = file.name;
    fSize.textContent = fmt(file.size);
    filePill.classList.add('show');
    uploadZone.style.display = 'none';
    topTitle.textContent = file.name;

    showLoad(true, 'Extracting spatial structure...');
    await extractIFCData();
    renderSidebar();
    importBtn.classList.add('show');
    showLoad(false);

    setStatus('g',
      `✅ ${file.name} — ` +
      `${ifcData.floors.length} floors, ` +
      `${ifcData.spaces.length} spaces, ` +
      `${ifcData.walls.length} walls`
    );
  } catch (err) {
    showLoad(false);
    setStatus('r', `❌ ${err.message}`);
    console.error(err);
  }
}

function fitCameraToObject(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  const distance = (maxDim / 2) / Math.tan(fov / 2) * 1.6;

  camera.position.set(
    center.x + distance * 0.7,
    center.y + distance * 0.6,
    center.z + distance * 0.7
  );
  controls.target.copy(center);
  camera.lookAt(center);
  controls.update();
}

// ── Extract IFC Metadata via web-ifc-three ────────────────────
async function extractIFCData() {
  ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
  const mgr = ifcLoader.ifcManager;

  // Floors
  const storeyIDs = await mgr.getAllItemsOfType(modelID, IFCBUILDINGSTOREY, false);
  for (const id of storeyIDs) {
    const props = await mgr.getItemProperties(modelID, id);
    ifcData.floors.push({
      id,
      name: props.Name?.value || props.LongName?.value || `Storey ${id}`,
      elevation: props.Elevation?.value ?? 0
    });
  }

  // Spaces
  const spaceIDs = await mgr.getAllItemsOfType(modelID, IFCSPACE, false);
  for (const id of spaceIDs) {
    const props = await mgr.getItemProperties(modelID, id);
    // Try to find parent storey via spatial structure
    let parentName = '';
    try {
      const tree = await mgr.getSpatialStructure(modelID, false);
      parentName = findParentStorey(tree, id) || '';
    } catch(e) { /* ignore */ }

    ifcData.spaces.push({
      id,
      name: props.Name?.value || props.LongName?.value || `Space ${id}`,
      parent: parentName
    });
  }

  // Walls
  const wallIDs = await mgr.getAllItemsOfType(modelID, IFCWALL, false);
  const wallStdIDs = await mgr.getAllItemsOfType(modelID, IFCWALLSTANDARDCASE, false);
  for (const id of [...wallIDs, ...wallStdIDs]) {
    const props = await mgr.getItemProperties(modelID, id);
    ifcData.walls.push({
      id,
      name: props.Name?.value || `Wall ${id}`
    });
  }

  // Slabs
  const slabIDs = await mgr.getAllItemsOfType(modelID, IFCSLAB, false);
  for (const id of slabIDs) {
    const props = await mgr.getItemProperties(modelID, id);
    ifcData.slabs.push({
      id,
      name: props.Name?.value || `Slab ${id}`
    });
  }
}

function findParentStorey(node, targetID, currentStoreyName = '') {
  if (!node) return null;
  if (node.type === 'IFCBUILDINGSTOREY') {
    currentStoreyName = node.Name?.value || node.LongName?.value || '';
  }
  if (node.expressID === targetID) return currentStoreyName;
  if (node.children) {
    for (const child of node.children) {
      const r = findParentStorey(child, targetID, currentStoreyName);
      if (r) return r;
    }
  }
  return null;
}

// ── Sidebar ───────────────────────────────────────────────────
function renderSidebar() {
  const { floors, spaces, walls, slabs } = ifcData;
  let html = '';

  html += `<div class="sec-head">🏢 Model Summary</div>`;
  html += row('Floors',  floors.length);
  html += row('Spaces',  spaces.length);
  html += row('Walls',   walls.length);
  html += row('Slabs',   slabs.length);

  if (floors.length > 0 || spaces.length > 0) {
    html += `<div class="sec-head" style="margin-top:14px;">🏬 Floors & Spaces</div>`;
    html += `<div style="font-size:0.7rem;color:#aab3c6;margin-bottom:8px;">
      ✅ Select rooms to import into LCA Tool
    </div>`;

    if (floors.length > 0) {
      for (const floor of floors) {
        html += `<div class="floor-label">📐 ${floor.name}</div>`;
        const floorSpaces = spaces.filter(s => s.parent === floor.name);
        const list = floorSpaces.length > 0 ? floorSpaces : [];
        if (list.length > 0) {
          for (const sp of list) {
            const sel = selectedRooms.has(sp.id);
            html += `
              <div class="room-item ${sel?'sel':''}"
                   onclick="window.toggleRoom(${sp.id})">
                <span style="font-size:1rem;">${sel?'✅':'⬜'}</span>
                <div>
                  <div class="room-name">${sp.name}</div>
                  <div class="room-meta">IfcSpace #${sp.id}</div>
                </div>
              </div>`;
          }
        } else {
          html += `<div style="color:#aab3c6;font-size:0.75rem;padding:4px 8px;">No spaces on this floor</div>`;
        }
      }
      // Orphan spaces (no parent match)
      const orphans = spaces.filter(s => !floors.some(f => f.name === s.parent));
      if (orphans.length > 0) {
        html += `<div class="floor-label">📐 Other Spaces</div>`;
        for (const sp of orphans) {
          const sel = selectedRooms.has(sp.id);
          html += `
            <div class="room-item ${sel?'sel':''}"
                 onclick="window.toggleRoom(${sp.id})">
              <span style="font-size:1rem;">${sel?'✅':'⬜'}</span>
              <div>
                <div class="room-name">${sp.name}</div>
                <div class="room-meta">IfcSpace #${sp.id}</div>
              </div>
            </div>`;
        }
      }
    } else if (spaces.length > 0) {
      html += `<div class="floor-label">📐 Ground Floor</div>`;
      for (const sp of spaces) {
        const sel = selectedRooms.has(sp.id);
        html += `
          <div class="room-item ${sel?'sel':''}"
               onclick="window.toggleRoom(${sp.id})">
            <span style="font-size:1rem;">${sel?'✅':'⬜'}</span>
            <div>
              <div class="room-name">${sp.name}</div>
              <div class="room-meta">IfcSpace #${sp.id}</div>
            </div>
          </div>`;
      }
    }
  }

  if (walls.length > 0) {
    html += `<div class="sec-head" style="margin-top:14px;">🧱 Walls (${walls.length})</div>`;
    for (const w of walls.slice(0,5)) {
      html += row(w.name, 'Wall');
    }
    if (walls.length > 5) {
      html += `<div style="color:#aab3c6;font-size:0.7rem;padding:4px;">+${walls.length-5} more</div>`;
    }
  }

  sbScroll.innerHTML = html;
  updateImportBtn();
}

function row(k, v) {
  return `<div class="prop-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;
}

window.toggleRoom = id => {
  if (selectedRooms.has(id)) selectedRooms.delete(id);
  else selectedRooms.add(id);
  renderSidebar();
};

function updateImportBtn() {
  const n = selectedRooms.size;
  importBtn.textContent = n > 0
    ? `🚀 Import ${n} Room${n>1?'s':''} to LCA Tool`
    : `🚀 Import All Rooms to LCA Tool`;
}

// ── Import to LCA Tool ────────────────────────────────────────
importBtn.addEventListener('click', () => {
  const spaces = selectedRooms.size > 0
    ? ifcData.spaces.filter(s => selectedRooms.has(s.id))
    : ifcData.spaces;

  if (spaces.length === 0) {
    showToast('⚠️ No rooms found to import');
    return;
  }

  const floors = ifcData.floors.length > 0
    ? ifcData.floors
    : [{ id:'floor-0', name:'Ground Floor' }];

  const payload = {
    type: 'IFC_IMPORT',
    source: topTitle.textContent,
    building: {
      name: topTitle.textContent.replace(/\.ifc$/i,'') || 'IFC Building',
      location: '',
      projectType: 'office',
      floors: floors.map((floor, fi) => {
        const floorSpaces = spaces.filter(s => s.parent === floor.name);
        const roomsToImport = floorSpaces.length > 0 ? floorSpaces : spaces;
        return {
          id: `floor-ifc-${fi}`,
          name: floor.name,
          rooms: roomsToImport.map((sp, ri) => ({
            id: `room-ifc-${fi}-${ri}`,
            name: sp.name,
            dims: { length: 5, width: 5, height: 2.7 },
            fromIFC: true,
            ifcId: sp.id
          }))
        };
      })
    }
  };

  localStorage.setItem('lindner-ifc-import', JSON.stringify(payload));
  showToast(`✅ Importing ${spaces.length} rooms...`);
  setTimeout(() => {
    window.location.href = './index.html?from=ifc';
  }, 1200);
});

// ── Toolbar ───────────────────────────────────────────────────
document.getElementById('btnFit').onclick = () => {
  if (ifcModel) fitCameraToObject(ifcModel);
};

document.getElementById('btnWire').onclick = function() {
  if (!ifcModel) return;
  isWireframe = !isWireframe;
  ifcModel.traverse(obj => {
    if (obj.isMesh) {
      if (Array.isArray(obj.material)) {
        obj.material.forEach(m => m.wireframe = isWireframe);
      } else {
        obj.material.wireframe = isWireframe;
      }
    }
  });
  this.classList.toggle('active', isWireframe);
};

document.getElementById('btnXray').onclick = function() {
  if (!ifcModel) return;
  isXray = !isXray;
  ifcModel.traverse(obj => {
    if (obj.isMesh) {
      const apply = m => {
        m.transparent = isXray;
        m.opacity = isXray ? 0.3 : 1;
        m.depthWrite = !isXray;
      };
      if (Array.isArray(obj.material)) obj.material.forEach(apply);
      else apply(obj.material);
    }
  });
  this.classList.toggle('active', isXray);
};

document.getElementById('tTop').onclick = () => {
  if (!ifcModel) return;
  const box = new THREE.Box3().setFromObject(ifcModel);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  camera.position.set(c.x, c.y + Math.max(s.x, s.z) * 1.8, c.z);
  controls.target.copy(c);
};
document.getElementById('tFront').onclick = () => {
  if (!ifcModel) return;
  const box = new THREE.Box3().setFromObject(ifcModel);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  camera.position.set(c.x, c.y, c.z + Math.max(s.x, s.y) * 1.8);
  controls.target.copy(c);
};
document.getElementById('tRight').onclick = () => {
  if (!ifcModel) return;
  const box = new THREE.Box3().setFromObject(ifcModel);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  camera.position.set(c.x + Math.max(s.y, s.z) * 1.8, c.y, c.z);
  controls.target.copy(c);
};
document.getElementById('t3D').onclick = () => {
  if (ifcModel) fitCameraToObject(ifcModel);
};

// ── File Input ────────────────────────────────────────────────
document.getElementById('ifcIn').onchange = e => {
  if (e.target.files[0]) loadIFC(e.target.files[0]);
};
uploadZone.onclick = () => document.getElementById('ifcIn').click();
uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('drag'); };
uploadZone.ondragleave = () => uploadZone.classList.remove('drag');
uploadZone.ondrop = e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f?.name.toLowerCase().endsWith('.ifc')) loadIFC(f);
};

// ── Init ──────────────────────────────────────────────────────
initScene();
</script>
</body>
</html>
