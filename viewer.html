<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lindner BIM Viewer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#06080d;
      color:#eaf0ff;
      font-family:"Inter",system-ui,sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .topbar {
      height:52px;
      background:rgba(13,16,24,0.98);
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      padding:0 20px;
      gap:14px;
      flex-shrink:0;
      z-index:100;
    }
    .brand {
      font-size:0.95rem;
      font-weight:900;
      background:linear-gradient(135deg,#79f5dc,#5ea7ff);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .divider { width:1px; height:20px; background:rgba(255,255,255,0.1); }
    .top-title { font-size:0.82rem; color:#aab3c6; font-weight:600; }
    .top-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .btn {
      padding:7px 14px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:#eaf0ff;
      font-size:0.8rem;
      font-weight:700;
      cursor:pointer;
      transition:all 0.15s;
      display:inline-flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
    }
    .btn:hover { background:rgba(94,167,255,0.15); border-color:rgba(94,167,255,0.4); }
    .btn-primary {
      background:linear-gradient(135deg,rgba(94,167,255,0.25),rgba(121,245,220,0.18));
      border-color:rgba(94,167,255,0.45);
    }
    .btn-success {
      background:linear-gradient(135deg,rgba(121,245,220,0.2),rgba(94,167,255,0.15));
      border-color:rgba(121,245,220,0.4);
    }
    .back { color:#aab3c6; text-decoration:none; font-size:0.8rem; font-weight:600; display:flex; align-items:center; gap:5px; }
    .back:hover { color:#eaf0ff; }
    .main { flex:1; display:flex; overflow:hidden; }
    .sidebar {
      width:270px;
      background:rgba(13,16,24,0.98);
      border-right:1px solid rgba(255,255,255,0.06);
      display:flex;
      flex-direction:column;
      flex-shrink:0;
    }
    .sb-section { padding:14px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .sb-title {
      font-size:0.7rem;
      font-weight:800;
      color:#aab3c6;
      text-transform:uppercase;
      letter-spacing:0.06em;
      margin-bottom:10px;
    }
    .upload-zone {
      border:2px dashed rgba(94,167,255,0.3);
      border-radius:10px;
      padding:20px;
      text-align:center;
      cursor:pointer;
      transition:all 0.2s;
    }
    .upload-zone:hover { border-color:rgba(94,167,255,0.6); background:rgba(94,167,255,0.05); }
    .upload-zone.drag { border-color:#79f5dc; background:rgba(121,245,220,0.08); }
    .upload-icon { font-size:2rem; margin-bottom:6px; }
    .upload-text { font-size:0.8rem; color:#aab3c6; line-height:1.4; }
    .upload-text b { color:#5ea7ff; }
    .file-pill {
      display:none;
      background:rgba(121,245,220,0.08);
      border:1px solid rgba(121,245,220,0.25);
      border-radius:8px;
      padding:10px 12px;
      font-size:0.78rem;
    }
    .file-pill.show { display:block; }
    .file-pill .fn { font-weight:700; color:#79f5dc; margin-bottom:2px; }
    .file-pill .fs { color:#aab3c6; font-size:0.72rem; }
    .sb-scroll { flex:1; overflow-y:auto; padding:14px; }
    .sb-empty { text-align:center; color:#aab3c6; font-size:0.78rem; padding:20px 0; }
    .import-wrap { padding:12px 14px; border-top:1px solid rgba(255,255,255,0.06); }
    .import-btn {
      display:none;
      width:100%;
      padding:10px;
      background:linear-gradient(135deg,rgba(121,245,220,0.2),rgba(94,167,255,0.15));
      border:1px solid rgba(121,245,220,0.4);
      border-radius:10px;
      color:#eaf0ff;
      font-weight:800;
      font-size:0.85rem;
      cursor:pointer;
      transition:all 0.2s;
    }
    .import-btn.show { display:block; }
    .import-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(121,245,220,0.2); }
    .room-item {
      padding:8px 10px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.06);
      margin-bottom:4px;
      cursor:pointer;
      font-size:0.78rem;
      transition:all 0.15s;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .room-item:hover { background:rgba(94,167,255,0.08); border-color:rgba(94,167,255,0.25); }
    .room-item.sel { background:rgba(121,245,220,0.1); border-color:rgba(121,245,220,0.4); }
    .room-name { font-weight:700; color:#eaf0ff; }
    .room-meta { color:#aab3c6; font-size:0.7rem; margin-top:1px; }
    .floor-label {
      font-weight:800;
      font-size:0.78rem;
      color:#5ea7ff;
      margin:10px 0 6px;
      padding-bottom:4px;
      border-bottom:1px solid rgba(94,167,255,0.2);
    }
    .prop-row {
      display:flex;
      justify-content:space-between;
      padding:4px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
      font-size:0.76rem;
      gap:8px;
    }
    .pk { color:#aab3c6; flex-shrink:0; }
    .pv { color:#eaf0ff; font-weight:600; text-align:right; word-break:break-word; }
    .sec-head { font-weight:800; font-size:0.82rem; color:#79f5dc; margin:10px 0 6px; }
    .viewer-wrap { flex:1; position:relative; overflow:hidden; }
    #xeo-canvas { width:100%; height:100%; display:block; background:#0a0e1a; }
    .empty {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; pointer-events:none;
    }
    .empty.hide { display:none; }
    .empty-icon { font-size:4rem; opacity:0.2; }
    .empty-title { font-size:1rem; font-weight:800; opacity:0.4; }
    .empty-sub { font-size:0.78rem; color:#aab3c6; opacity:0.4; text-align:center; max-width:240px; }
    .loading {
      position:absolute; inset:0;
      background:rgba(6,8,13,0.92);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:14px; backdrop-filter:blur(8px);
    }
    .loading.hide { display:none; }
    .spin {
      width:40px; height:40px;
      border:3px solid rgba(94,167,255,0.2);
      border-top-color:#5ea7ff;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .load-title { font-size:0.9rem; font-weight:700; }
    .load-sub { font-size:0.76rem; color:#aab3c6; }
    .tools {
      position:absolute; top:12px; right:12px;
      display:flex; flex-direction:column; gap:6px; z-index:10;
    }
    .tool {
      width:34px; height:34px;
      background:rgba(13,16,24,0.9);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; color:#eaf0ff;
      cursor:pointer; font-size:0.85rem;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; backdrop-filter:blur(8px);
    }
    .tool:hover { background:rgba(94,167,255,0.2); border-color:rgba(94,167,255,0.4); }
    .tool.active { background:rgba(121,245,220,0.2); border-color:rgba(121,245,220,0.4); }
    .statusbar {
      height:26px;
      background:rgba(13,16,24,0.98);
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex; align-items:center;
      padding:0 16px; gap:10px;
      font-size:0.7rem; color:#aab3c6;
    }
    .dot { width:6px; height:6px; border-radius:50%; background:#aab3c6; }
    .dot.g { background:#79f5dc; }
    .dot.y { background:#ffd080; }
    .dot.r { background:#ff6b6b; }
    .toast {
      position:fixed; bottom:40px; left:50%;
      transform:translateX(-50%);
      background:rgba(121,245,220,0.15);
      border:1px solid rgba(121,245,220,0.4);
      border-radius:12px; padding:10px 20px;
      font-size:0.82rem; font-weight:700; color:#79f5dc;
      z-index:9999; display:none; backdrop-filter:blur(8px);
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
  </style>
</head>
<body>
<div class="topbar">
  <a href="./index.html" class="back">← Back</a>
  <div class="divider"></div>
  <div class="brand">🏗️ Lindner BIM Viewer</div>
  <div class="divider"></div>
  <div class="top-title" id="topTitle">No file loaded</div>
  <div class="top-actions">
    <button class="btn" id="btnFit">⊡ Fit</button>
    <button class="btn" id="btnWire">🔲 Wire</button>
    <button class="btn" id="btnXray">👁 X-Ray</button>
    <label class="btn btn-primary" for="ifcIn">📂 Open IFC</label>
    <input type="file" id="ifcIn" accept=".ifc,.IFC" style="display:none">
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">📁 IFC File</div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">🏗️</div>
        <div class="upload-text"><b>Drop IFC here</b><br>or click to browse</div>
      </div>
      <div class="file-pill" id="filePill">
        <div class="fn" id="fName"></div>
        <div class="fs" id="fSize"></div>
      </div>
    </div>
    <div class="sb-scroll" id="sbScroll">
      <div class="sb-empty">
        <div style="font-size:2rem;margin-bottom:8px;">🏢</div>
        Load an IFC file to see<br>floors and rooms
      </div>
    </div>
    <div class="import-wrap">
      <button class="import-btn" id="importBtn">
        🚀 Import Rooms to LCA Tool
      </button>
    </div>
  </div>
  <div class="viewer-wrap">
    <canvas id="xeo-canvas"></canvas>
    <div class="empty" id="emptyEl">
      <div class="empty-icon">🏗️</div>
      <div class="empty-title">No IFC File Loaded</div>
      <div class="empty-sub">Open an IFC file to view your building model in 3D</div>
    </div>
    <div class="loading hide" id="loadEl">
      <div class="spin"></div>
      <div class="load-title">Loading IFC Model...</div>
      <div class="load-sub" id="loadSub">Please wait...</div>
    </div>
    <div class="tools">
      <button class="tool" id="tTop"    title="Top view">⬆</button>
      <button class="tool" id="tFront"  title="Front view">⬛</button>
      <button class="tool" id="tRight"  title="Right view">▶</button>
      <button class="tool" id="t3D"     title="3D view">🔷</button>
      <button class="tool" id="tSect"   title="Section">✂️</button>
    </div>
  </div>
</div>
<div class="statusbar">
  <div class="dot" id="sDot"></div>
  <span id="sTxt">Ready — Open an IFC file</span>
  <span style="margin-left:auto">xeokit-sdk • WebIFC</span>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import {
  Viewer,
  WebIFCLoaderPlugin,
  NavCubePlugin,
  SectionPlanesPlugin
} from "https://cdn.jsdelivr.net/npm/@xeokit/xeokit-sdk/dist/xeokit-sdk.es.min.js";
import * as WebIFC from "https://cdn.jsdelivr.net/npm/web-ifc@0.0.34/web-ifc-api.js";

const topTitle  = document.getElementById('topTitle');
const uploadZone= document.getElementById('uploadZone');
const filePill  = document.getElementById('filePill');
const fName     = document.getElementById('fName');
const fSize     = document.getElementById('fSize');
const sbScroll  = document.getElementById('sbScroll');
const emptyEl   = document.getElementById('emptyEl');
const loadEl    = document.getElementById('loadEl');
const loadSub   = document.getElementById('loadSub');
const importBtn = document.getElementById('importBtn');
const sDot      = document.getElementById('sDot');
const sTxt      = document.getElementById('sTxt');
const toast     = document.getElementById('toast');

let viewer       = null;
let loaderPlugin = null;
let model        = null;
let sectionPlanes= null;
let currentFile  = null;
let ifcData      = { floors:[], spaces:[], walls:[], slabs:[] };
let selectedRooms= new Set();
let isWireframe  = false;
let isXray       = false;

const setStatus = (dot, txt) => {
  sDot.className = 'dot' + (dot ? ` ${dot}` : '');
  sTxt.textContent = txt;
};
const showLoad = (show, msg='') => {
  loadEl.classList.toggle('hide', !show);
  if (msg) loadSub.textContent = msg;
};
const fmt = b => b < 1048576
  ? (b/1024).toFixed(1)+' KB'
  : (b/1048576).toFixed(1)+' MB';
const showToast = msg => {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display='none', 3000);
};

// ── Init xeokit Viewer (now async) ────────────────────────────
async function initViewer() {
  viewer = new Viewer({
    canvasId: "xeo-canvas",
    transparent: true,
    dtxEnabled: true,
    pbrEnabled: true,
  });
  viewer.scene.canvas.canvas.style.background =
    "linear-gradient(180deg, #0d1018 0%, #0a0e1a 100%)";

  viewer.camera.eye  = [10, 10, 10];
  viewer.camera.look = [0, 0, 0];
  viewer.camera.up   = [0, 1, 0];

  new NavCubePlugin(viewer, {
    canvasId: "xeo-canvas",
    visible: true,
    size: 100,
    alignment: "bottomRight",
    bottomMargin: 30,
    rightMargin: 10,
  });

  sectionPlanes = new SectionPlanesPlugin(viewer, {
    overviewVisible: false,
  });

  // Init WebIFC API
  const ifcApi = new WebIFC.IfcAPI();
  ifcApi.SetWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.34/");
  await ifcApi.Init();

  loaderPlugin = new WebIFCLoaderPlugin(viewer, {
    WebIFC,
    IfcAPI: ifcApi,
  });

  viewer.scene.input.on("mouseclicked", coords => {
    const hit = viewer.scene.pick({ canvasPos: coords });
    if (hit?.entity) {
      viewer.scene.setObjectsHighlighted(
        viewer.scene.highlightedObjectIds, false
      );
      hit.entity.highlighted = true;
      const meta = viewer.metaScene.metaObjects[hit.entity.id];
      if (meta) showProps(meta);
    } else {
      viewer.scene.setObjectsHighlighted(
        viewer.scene.highlightedObjectIds, false
      );
    }
  });

  setStatus('g', 'Viewer ready — Open an IFC file');
}

async function loadIFC(file) {
  if (!viewer || !loaderPlugin) {
    setStatus('y', 'Initializing viewer...');
    await initViewer();
  }
  if (model) { model.destroy(); model = null; }
  currentFile = file;

  showLoad(true, 'Parsing IFC geometry...');
  emptyEl.classList.add('hide');
  setStatus('y', `Loading ${file.name}...`);

  try {
    const url = URL.createObjectURL(file);

    model = loaderPlugin.load({
      id:   "ifcModel",
      src:   url,
      excludeUnclassifiedObjects: false,
      objectDefaults: {
        IfcSpace: { visible: false },
      }
    });

    model.on("loaded", () => {
      URL.revokeObjectURL(url);
      showLoad(false);
      viewer.cameraFlight.flyTo(model, { duration: 1 });

      fName.textContent = file.name;
      fSize.textContent = fmt(file.size);
      filePill.classList.add('show');
      uploadZone.style.display = 'none';
      topTitle.textContent = file.name;
      setStatus('g', `✅ ${file.name} loaded`);

      extractIFCData();
      renderSidebar();
      importBtn.classList.add('show');
    });

    model.on("error", err => {
      URL.revokeObjectURL(url);
      showLoad(false);
      setStatus('r', `❌ ${err}`);
      console.error('Model error:', err);
    });
  } catch(err) {
    showLoad(false);
    setStatus('r', `❌ ${err.message}`);
    console.error(err);
  }
}

function extractIFCData() {
  ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
  const metaObjects = viewer.metaScene.metaObjects;

  for (const id in metaObjects) {
    const obj = metaObjects[id];
    const type = obj.type;

    if (type === 'IfcBuildingStorey') {
      ifcData.floors.push({
        id: obj.id,
        name: obj.name || 'Floor',
        children: obj.children || []
      });
    }
    if (type === 'IfcSpace') {
      ifcData.spaces.push({
        id: obj.id,
        name: obj.name || 'Space',
        parent: obj.parent?.name || ''
      });
    }
    if (type === 'IfcWall' || type === 'IfcWallStandardCase') {
      ifcData.walls.push({ id: obj.id, name: obj.name || 'Wall' });
    }
    if (type === 'IfcSlab') {
      ifcData.slabs.push({ id: obj.id, name: obj.name || 'Slab' });
    }
  }

  setStatus('g',
    `✅ ${currentFile?.name || 'Model'} — ` +
    `${ifcData.floors.length} floors, ` +
    `${ifcData.spaces.length} spaces, ` +
    `${ifcData.walls.length} walls`
  );
}

function showProps(meta) {
  let html = `<div class="sec-head">📦 ${meta.name || 'Element'}</div>`;
  html += `<div class="prop-row"><span class="pk">Type</span><span class="pv">${meta.type||'—'}</span></div>`;
  html += `<div class="prop-row"><span class="pk">ID</span><span class="pv">${meta.id||'—'}</span></div>`;
  if (meta.parent) {
    html += `<div class="prop-row"><span class="pk">Parent</span><span class="pv">${meta.parent.name||'—'}</span></div>`;
  }
  if (meta.propertySets?.length) {
    for (const pset of meta.propertySets) {
      if (pset.properties?.length) {
        html += `<div class="sec-head" style="margin-top:10px;">${pset.name||'Properties'}</div>`;
        for (const p of pset.properties) {
          html += `<div class="prop-row">
            <span class="pk">${p.name}</span>
            <span class="pv">${p.value??'—'}</span>
          </div>`;
        }
      }
    }
  }
  sbScroll.innerHTML = html;
}

function renderSidebar() {
  const { floors, spaces, walls, slabs } = ifcData;
  let html = '';

  html += `<div class="sec-head">🏢 Model Summary</div>`;
  html += row('Floors',  floors.length);
  html += row('Spaces',  spaces.length);
  html += row('Walls',   walls.length);
  html += row('Slabs',   slabs.length);

  if (floors.length > 0 || spaces.length > 0) {
    html += `<div class="sec-head" style="margin-top:14px;">🏬 Floors & Spaces</div>`;
    html += `<div style="font-size:0.7rem;color:#aab3c6;margin-bottom:8px;">
      ✅ Select rooms to import into LCA Tool
    </div>`;

    if (floors.length > 0) {
      for (const floor of floors) {
        html += `<div class="floor-label">📐 ${floor.name}</div>`;
        const floorSpaces = spaces.filter(s =>
          s.parent === floor.name || spaces.length <= 5
        );
        if (floorSpaces.length > 0) {
          for (const sp of floorSpaces) {
            const sel = selectedRooms.has(sp.id);
            html += `
              <div class="room-item ${sel?'sel':''}"
                   onclick="window.toggleRoom('${sp.id}')">
                <span style="font-size:1rem;">${sel?'✅':'⬜'}</span>
                <div>
                  <div class="room-name">${sp.name}</div>
                  <div class="room-meta">IfcSpace</div>
                </div>
              </div>`;
          }
        } else {
          html += `<div style="color:#aab3c6;font-size:0.75rem;padding:4px 8px;">No spaces on this floor</div>`;
        }
      }
    } else if (spaces.length > 0) {
      html += `<div class="floor-label">📐 Ground Floor</div>`;
      for (const sp of spaces) {
        const sel = selectedRooms.has(sp.id);
        html += `
          <div class="room-item ${sel?'sel':''}"
               onclick="window.toggleRoom('${sp.id}')">
            <span style="font-size:1rem;">${sel?'✅':'⬜'}</span>
            <div>
              <div class="room-name">${sp.name}</div>
              <div class="room-meta">IfcSpace</div>
            </div>
          </div>`;
      }
    }
  }

  if (walls.length > 0) {
    html += `<div class="sec-head" style="margin-top:14px;">🧱 Walls (${walls.length})</div>`;
    for (const w of walls.slice(0,5)) {
      html += row(w.name, 'Wall');
    }
    if (walls.length > 5) {
      html += `<div style="color:#aab3c6;font-size:0.7rem;padding:4px;">+${walls.length-5} more</div>`;
    }
  }

  sbScroll.innerHTML = html;
  updateImportBtn();
}

function row(k, v) {
  return `<div class="prop-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;
}

window.toggleRoom = id => {
  if (selectedRooms.has(id)) {
    selectedRooms.delete(id);
    viewer.scene.setObjectsSelected([id], false);
  } else {
    selectedRooms.add(id);
    viewer.scene.setObjectsSelected([id], true);
  }
  renderSidebar();
};

function updateImportBtn() {
  const n = selectedRooms.size;
  if (n > 0) {
    importBtn.textContent = `🚀 Import ${n} Room${n>1?'s':''} to LCA Tool`;
  } else {
    importBtn.textContent = `🚀 Import All Rooms to LCA Tool`;
  }
}

importBtn.addEventListener('click', () => {
  const spaces = selectedRooms.size > 0
    ? ifcData.spaces.filter(s => selectedRooms.has(s.id))
    : ifcData.spaces;

  if (spaces.length === 0) {
    showToast('⚠️ No rooms found to import');
    return;
  }

  const floors = ifcData.floors.length > 0
    ? ifcData.floors
    : [{ id:'floor-0', name:'Ground Floor' }];

  const payload = {
    type: 'IFC_IMPORT',
    source: topTitle.textContent,
    building: {
      name: topTitle.textContent.replace(/\.ifc$/i,'') || 'IFC Building',
      location: '',
      projectType: 'office',
      floors: floors.map((floor, fi) => {
        const floorSpaces = spaces.filter(s =>
          s.parent === floor.name || spaces.length <= 5
        );
        const roomsToImport = floorSpaces.length > 0 ? floorSpaces : spaces;
        return {
          id: `floor-ifc-${fi}`,
          name: floor.name,
          rooms: roomsToImport.map((sp, ri) => ({
            id: `room-ifc-${fi}-${ri}`,
            name: sp.name,
            dims: { length: 5, width: 5, height: 2.7 },
            fromIFC: true,
            ifcId: sp.id,
          }))
        };
      })
    }
  };

  localStorage.setItem('lindner-ifc-import', JSON.stringify(payload));
  showToast(`✅ Importing ${spaces.length} rooms...`);
  setTimeout(() => {
    window.location.href = './index.html?from=ifc';
  }, 1200);
});

document.getElementById('btnFit').onclick = () => {
  if (model) viewer.cameraFlight.flyTo(model);
};
document.getElementById('btnWire').onclick = function() {
  if (!viewer) return;
  isWireframe = !isWireframe;
  viewer.scene.setObjectsWireframe(viewer.scene.objectIds, isWireframe);
  this.classList.toggle('active', isWireframe);
};
document.getElementById('btnXray').onclick = function() {
  if (!viewer) return;
  isXray = !isXray;
  viewer.scene.setObjectsXRayed(viewer.scene.objectIds, isXray);
  this.classList.toggle('active', isXray);
};
document.getElementById('tTop').onclick = () => {
  if (!viewer) return;
  viewer.cameraFlight.flyTo({
    eye:[0,30,0], look:[0,0,0], up:[0,0,-1], duration:0.8
  });
};
document.getElementById('tFront').onclick = () => {
  if (!viewer) return;
  viewer.cameraFlight.flyTo({
    eye:[0,5,30], look:[0,5,0], up:[0,1,0], duration:0.8
  });
};
document.getElementById('tRight').onclick = () => {
  if (!viewer) return;
  viewer.cameraFlight.flyTo({
    eye:[30,5,0], look:[0,5,0], up:[0,1,0], duration:0.8
  });
};
document.getElementById('t3D').onclick = () => {
  if (model) viewer.cameraFlight.flyTo(model, { duration:0.8 });
};
document.getElementById('tSect').onclick = function() {
  if (!sectionPlanes) return;
  this.classList.toggle('active');
  if (this.classList.contains('active')) {
    sectionPlanes.createSectionPlane({
      id: "sp1",
      pos: [0, 5, 0],
      dir: [0, -1, 0],
      active: true
    });
    sectionPlanes.showControl("sp1");
  } else {
    sectionPlanes.destroySectionPlane("sp1");
  }
};

document.getElementById('ifcIn').onchange = e => {
  if (e.target.files[0]) loadIFC(e.target.files[0]);
};
uploadZone.onclick = () => document.getElementById('ifcIn').click();
uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('drag'); };
uploadZone.ondragleave = () => uploadZone.classList.remove('drag');
uploadZone.ondrop = e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f?.name.toLowerCase().endsWith('.ifc')) loadIFC(f);
};

// Init viewer asynchronously
initViewer().catch(err => {
  console.error('Viewer init failed:', err);
  setStatus('r', `❌ Init failed: ${err.message}`);
});
</script>
</body>
</html>
