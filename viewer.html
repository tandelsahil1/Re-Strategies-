<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lindner BIM Viewer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#06080d; color:#eaf0ff; font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { height:52px; background:rgba(13,16,24,0.98); border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; padding:0 20px; gap:14px; flex-shrink:0; }
    .brand { font-size:0.95rem; font-weight:900; background:linear-gradient(135deg,#79f5dc,#5ea7ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .divider { width:1px; height:20px; background:rgba(255,255,255,0.1); }
    .top-title { font-size:0.82rem; color:#aab3c6; font-weight:600; }
    .top-actions { margin-left:auto; display:flex; gap:8px; }
    .btn { padding:7px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:#eaf0ff; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
    .btn:hover { background:rgba(94,167,255,0.15); border-color:rgba(94,167,255,0.4); }
    .btn-primary { background:linear-gradient(135deg,rgba(94,167,255,0.25),rgba(121,245,220,0.18)); border-color:rgba(94,167,255,0.45); }
    .back { color:#aab3c6; text-decoration:none; font-size:0.8rem; font-weight:600; }
    .main { flex:1; display:flex; overflow:hidden; }
    .sidebar { width:280px; background:rgba(13,16,24,0.98); border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; }
    .sb-section { padding:14px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .sb-title { font-size:0.7rem; font-weight:800; color:#aab3c6; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
    .upload-zone { border:2px dashed rgba(94,167,255,0.3); border-radius:10px; padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .upload-zone:hover { border-color:rgba(94,167,255,0.6); background:rgba(94,167,255,0.05); }
    .upload-zone.drag { border-color:#79f5dc; background:rgba(121,245,220,0.08); }
    .upload-icon { font-size:2rem; margin-bottom:6px; }
    .upload-text { font-size:0.8rem; color:#aab3c6; line-height:1.4; }
    .upload-text b { color:#5ea7ff; }
    .file-pill { display:none; background:rgba(121,245,220,0.08); border:1px solid rgba(121,245,220,0.25); border-radius:8px; padding:10px 12px; font-size:0.78rem; }
    .file-pill.show { display:block; }
    .file-pill .fn { font-weight:700; color:#79f5dc; }
    .file-pill .fs { color:#aab3c6; font-size:0.72rem; margin-top:2px; }
    .sb-scroll { flex:1; overflow-y:auto; padding:14px; }
    .sb-empty { text-align:center; color:#aab3c6; font-size:0.78rem; padding:20px 0; }
    .prop-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.76rem; gap:8px; }
    .pk { color:#aab3c6; }
    .pv { color:#eaf0ff; font-weight:600; text-align:right; word-break:break-word; }
    .sec-head { font-weight:800; font-size:0.82rem; color:#79f5dc; margin:10px 0 6px; }
    .room-item { padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); margin-bottom:4px; cursor:pointer; font-size:0.78rem; transition:all 0.15s; display:flex; align-items:center; gap:8px; }
    .room-item:hover { background:rgba(94,167,255,0.08); }
    .room-item.sel { background:rgba(121,245,220,0.1); border-color:rgba(121,245,220,0.4); }
    .room-name { font-weight:700; color:#eaf0ff; }
    .room-meta { color:#aab3c6; font-size:0.7rem; }
    .floor-label { font-weight:800; font-size:0.78rem; color:#5ea7ff; margin:10px 0 6px; padding-bottom:4px; border-bottom:1px solid rgba(94,167,255,0.2); }
    .import-wrap { padding:12px 14px; border-top:1px solid rgba(255,255,255,0.06); }
    .import-btn { display:none; width:100%; padding:10px; background:linear-gradient(135deg,rgba(121,245,220,0.2),rgba(94,167,255,0.15)); border:1px solid rgba(121,245,220,0.4); border-radius:10px; color:#eaf0ff; font-weight:800; font-size:0.85rem; cursor:pointer; }
    .import-btn.show { display:block; }
    .viewer-wrap { flex:1; position:relative; overflow:hidden; }
    #three-canvas { width:100%; height:100%; display:block; background:#0a0e1a; }
    .empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; pointer-events:none; }
    .empty.hide { display:none; }
    .empty-icon { font-size:4rem; opacity:0.2; }
    .empty-title { font-size:1rem; font-weight:800; opacity:0.4; }
    .empty-sub { font-size:0.78rem; color:#aab3c6; opacity:0.4; text-align:center; max-width:240px; }
    .loading { position:absolute; inset:0; background:rgba(6,8,13,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; backdrop-filter:blur(8px); z-index:50; }
    .loading.hide { display:none; }
    .spin { width:40px; height:40px; border:3px solid rgba(94,167,255,0.2); border-top-color:#5ea7ff; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .load-title { font-size:0.9rem; font-weight:700; }
    .load-sub { font-size:0.76rem; color:#aab3c6; }
    .statusbar { height:26px; background:rgba(13,16,24,0.98); border-top:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 16px; gap:10px; font-size:0.7rem; color:#aab3c6; }
    .dot { width:6px; height:6px; border-radius:50%; background:#aab3c6; }
    .dot.g { background:#79f5dc; } .dot.y { background:#ffd080; } .dot.r { background:#ff6b6b; }
    .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:rgba(121,245,220,0.15); border:1px solid rgba(121,245,220,0.4); border-radius:12px; padding:10px 20px; font-size:0.82rem; font-weight:700; color:#79f5dc; z-index:9999; display:none; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="./index.html" class="back">← Back</a>
  <div class="divider"></div>
  <div class="brand">🏗️ Lindner BIM Viewer</div>
  <div class="divider"></div>
  <div class="top-title" id="topTitle">No file loaded</div>
  <div class="top-actions">
    <button class="btn" id="btnFit">⊡ Fit</button>
    <button class="btn" id="btnWire">🔲 Wire</button>
    <button class="btn" id="btnXray">👁 X-Ray</button>
    <label class="btn btn-primary" for="ifcIn">📂 Open IFC</label>
    <input type="file" id="ifcIn" accept=".ifc,.IFC" style="display:none">
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">📁 IFC File</div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">🏗️</div>
        <div class="upload-text"><b>Drop IFC here</b><br>or click to browse</div>
      </div>
      <div class="file-pill" id="filePill">
        <div class="fn" id="fName"></div>
        <div class="fs" id="fSize"></div>
      </div>
    </div>
    <div class="sb-scroll" id="sbScroll">
      <div class="sb-empty">
        <div style="font-size:2rem;margin-bottom:8px;">🏢</div>
        Load an IFC file to see<br>floors and rooms
      </div>
    </div>
    <div class="import-wrap">
      <button class="import-btn" id="importBtn">🚀 Import Rooms to LCA Tool</button>
    </div>
  </div>

  <div class="viewer-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="empty" id="emptyEl">
      <div class="empty-icon">🏗️</div>
      <div class="empty-title">No IFC File Loaded</div>
      <div class="empty-sub">Open an IFC file to view your building model in 3D</div>
    </div>
    <div class="loading hide" id="loadEl">
      <div class="spin"></div>
      <div class="load-title">Loading IFC Model...</div>
      <div class="load-sub" id="loadSub">Please wait...</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="dot" id="sDot"></div>
  <span id="sTxt">Ready — Open an IFC file</span>
  <span style="margin-left:auto">three.js • web-ifc (Vite)</span>
</div>

<div class="toast" id="toast"></div>

<!-- Vite handles the imports - no importmap needed! -->
<script type="module" src="/viewer.js"></script>

</body>
</html>
