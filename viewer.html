<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lindner BIM Viewer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#06080d;
      color:#eaf0ff;
      font-family:"Inter",system-ui,sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .topbar {
      height:52px;
      background:rgba(13,16,24,0.98);
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center;
      padding:0 20px; gap:14px;
      flex-shrink:0;
    }
    .brand {
      font-size:0.95rem; font-weight:900;
      background:linear-gradient(135deg,#79f5dc,#5ea7ff);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .divider { width:1px; height:20px; background:rgba(255,255,255,0.1); }
    .top-title { font-size:0.82rem; color:#aab3c6; font-weight:600; }
    .top-actions { margin-left:auto; display:flex; gap:8px; }
    .btn {
      padding:7px 14px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:#eaf0ff; font-size:0.8rem; font-weight:700;
      cursor:pointer; transition:all 0.15s;
      display:inline-flex; align-items:center; gap:6px;
      text-decoration:none;
    }
    .btn:hover { background:rgba(94,167,255,0.15); border-color:rgba(94,167,255,0.4); }
    .btn-primary {
      background:linear-gradient(135deg,rgba(94,167,255,0.25),rgba(121,245,220,0.18));
      border-color:rgba(94,167,255,0.45);
    }
    .back { color:#aab3c6; text-decoration:none; font-size:0.8rem; font-weight:600; }
    .back:hover { color:#eaf0ff; }
    .main { flex:1; display:flex; overflow:hidden; }
    .sidebar {
      width:280px; background:rgba(13,16,24,0.98);
      border-right:1px solid rgba(255,255,255,0.06);
      display:flex; flex-direction:column;
    }
    .sb-section { padding:14px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .sb-title {
      font-size:0.7rem; font-weight:800; color:#aab3c6;
      text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px;
    }
    .upload-zone {
      border:2px dashed rgba(94,167,255,0.3);
      border-radius:10px; padding:20px;
      text-align:center; cursor:pointer; transition:all 0.2s;
    }
    .upload-zone:hover { border-color:rgba(94,167,255,0.6); background:rgba(94,167,255,0.05); }
    .upload-zone.drag { border-color:#79f5dc; background:rgba(121,245,220,0.08); }
    .upload-icon { font-size:2rem; margin-bottom:6px; }
    .upload-text { font-size:0.8rem; color:#aab3c6; line-height:1.4; }
    .upload-text b { color:#5ea7ff; }
    .file-pill {
      display:none;
      background:rgba(121,245,220,0.08);
      border:1px solid rgba(121,245,220,0.25);
      border-radius:8px; padding:10px 12px; font-size:0.78rem;
    }
    .file-pill.show { display:block; }
    .file-pill .fn { font-weight:700; color:#79f5dc; }
    .file-pill .fs { color:#aab3c6; font-size:0.72rem; margin-top:2px; }
    .sb-scroll { flex:1; overflow-y:auto; padding:14px; }
    .sb-empty { text-align:center; color:#aab3c6; font-size:0.78rem; padding:20px 0; }
    .prop-row {
      display:flex; justify-content:space-between;
      padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04);
      font-size:0.76rem; gap:8px;
    }
    .pk { color:#aab3c6; }
    .pv { color:#eaf0ff; font-weight:600; text-align:right; word-break:break-word; }
    .sec-head { font-weight:800; font-size:0.82rem; color:#79f5dc; margin:10px 0 6px; }
    .room-item {
      padding:8px 10px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.06);
      margin-bottom:4px; cursor:pointer;
      font-size:0.78rem; transition:all 0.15s;
      display:flex; align-items:center; gap:8px;
    }
    .room-item:hover { background:rgba(94,167,255,0.08); }
    .room-item.sel { background:rgba(121,245,220,0.1); border-color:rgba(121,245,220,0.4); }
    .room-name { font-weight:700; color:#eaf0ff; }
    .room-meta { color:#aab3c6; font-size:0.7rem; }
    .floor-label {
      font-weight:800; font-size:0.78rem;
      color:#5ea7ff; margin:10px 0 6px;
      padding-bottom:4px; border-bottom:1px solid rgba(94,167,255,0.2);
    }
    .import-wrap { padding:12px 14px; border-top:1px solid rgba(255,255,255,0.06); }
    .import-btn {
      display:none; width:100%; padding:10px;
      background:linear-gradient(135deg,rgba(121,245,220,0.2),rgba(94,167,255,0.15));
      border:1px solid rgba(121,245,220,0.4);
      border-radius:10px; color:#eaf0ff;
      font-weight:800; font-size:0.85rem;
      cursor:pointer; transition:all 0.2s;
    }
    .import-btn.show { display:block; }
    .import-btn:hover { transform:translateY(-1px); }
    .viewer-wrap { flex:1; position:relative; overflow:hidden; }
    #three-canvas { width:100%; height:100%; display:block; background:#0a0e1a; }
    .empty {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; pointer-events:none;
    }
    .empty.hide { display:none; }
    .empty-icon { font-size:4rem; opacity:0.2; }
    .empty-title { font-size:1rem; font-weight:800; opacity:0.4; }
    .empty-sub { font-size:0.78rem; color:#aab3c6; opacity:0.4; text-align:center; max-width:240px; }
    .loading {
      position:absolute; inset:0;
      background:rgba(6,8,13,0.92);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:14px; backdrop-filter:blur(8px); z-index:50;
    }
    .loading.hide { display:none; }
    .spin {
      width:40px; height:40px;
      border:3px solid rgba(94,167,255,0.2);
      border-top-color:#5ea7ff; border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .load-title { font-size:0.9rem; font-weight:700; }
    .load-sub { font-size:0.76rem; color:#aab3c6; }
    .tools {
      position:absolute; top:12px; right:12px;
      display:flex; flex-direction:column; gap:6px; z-index:10;
    }
    .tool {
      width:34px; height:34px;
      background:rgba(13,16,24,0.9);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; color:#eaf0ff;
      cursor:pointer; font-size:0.85rem;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; backdrop-filter:blur(8px);
    }
    .tool:hover { background:rgba(94,167,255,0.2); }
    .tool.active { background:rgba(121,245,220,0.2); border-color:rgba(121,245,220,0.4); }
    .statusbar {
      height:26px; background:rgba(13,16,24,0.98);
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex; align-items:center;
      padding:0 16px; gap:10px;
      font-size:0.7rem; color:#aab3c6;
    }
    .dot { width:6px; height:6px; border-radius:50%; background:#aab3c6; }
    .dot.g { background:#79f5dc; }
    .dot.y { background:#ffd080; }
    .dot.r { background:#ff6b6b; }
    .toast {
      position:fixed; bottom:40px; left:50%;
      transform:translateX(-50%);
      background:rgba(121,245,220,0.15);
      border:1px solid rgba(121,245,220,0.4);
      border-radius:12px; padding:10px 20px;
      font-size:0.82rem; font-weight:700; color:#79f5dc;
      z-index:9999; display:none;
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="./index.html" class="back">← Back</a>
  <div class="divider"></div>
  <div class="brand">🏗️ Lindner BIM Viewer</div>
  <div class="divider"></div>
  <div class="top-title" id="topTitle">No file loaded</div>
  <div class="top-actions">
    <button class="btn" id="btnFit">⊡ Fit</button>
    <button class="btn" id="btnWire">🔲 Wire</button>
    <button class="btn" id="btnXray">👁 X-Ray</button>
    <label class="btn btn-primary" for="ifcIn">📂 Open IFC</label>
    <input type="file" id="ifcIn" accept=".ifc,.IFC" style="display:none">
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">📁 IFC File</div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">🏗️</div>
        <div class="upload-text"><b>Drop IFC here</b><br>or click to browse</div>
      </div>
      <div class="file-pill" id="filePill">
        <div class="fn" id="fName"></div>
        <div class="fs" id="fSize"></div>
      </div>
    </div>
    <div class="sb-scroll" id="sbScroll">
      <div class="sb-empty">
        <div style="font-size:2rem;margin-bottom:8px;">🏢</div>
        Load an IFC file to see<br>floors and rooms
      </div>
    </div>
    <div class="import-wrap">
      <button class="import-btn" id="importBtn">🚀 Import Rooms to LCA Tool</button>
    </div>
  </div>

  <div class="viewer-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="empty" id="emptyEl">
      <div class="empty-icon">🏗️</div>
      <div class="empty-title">No IFC File Loaded</div>
      <div class="empty-sub">Open an IFC file to view your building model in 3D</div>
    </div>
    <div class="loading hide" id="loadEl">
      <div class="spin"></div>
      <div class="load-title">Loading IFC Model...</div>
      <div class="load-sub" id="loadSub">Please wait...</div>
    </div>
    <div class="tools">
      <button class="tool" id="tTop" title="Top">⬆</button>
      <button class="tool" id="tFront" title="Front">⬛</button>
      <button class="tool" id="tRight" title="Right">▶</button>
      <button class="tool" id="t3D" title="3D">🔷</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="dot" id="sDot"></div>
  <span id="sTxt">Ready — Open an IFC file</span>
  <span style="margin-left:auto">three.js • web-ifc</span>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { IFCLoader } from "https://cdn.jsdelivr.net/npm/web-ifc-three@0.0.125/IFCLoader.js";

// DOM
const topTitle  = document.getElementById('topTitle');
const uploadZone= document.getElementById('uploadZone');
const filePill  = document.getElementById('filePill');
const fName     = document.getElementById('fName');
const fSize     = document.getElementById('fSize');
const sbScroll  = document.getElementById('sbScroll');
const emptyEl   = document.getElementById('emptyEl');
const loadEl    = document.getElementById('loadEl');
const loadSub   = document.getElementById('loadSub');
const importBtn = document.getElementById('importBtn');
const sDot      = document.getElementById('sDot');
const sTxt      = document.getElementById('sTxt');
const toast     = document.getElementById('toast');
const canvas    = document.getElementById('three-canvas');

// State
let scene, camera, renderer, controls, ifcLoader;
let ifcModel = null;
let modelID = null;
let ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
let selectedRooms = new Set();
let isWireframe = false;
let isXray = false;

// Helpers
const setStatus = (dot, txt) => {
  sDot.className = 'dot' + (dot ? ` ${dot}` : '');
  sTxt.textContent = txt;
};
const showLoad = (show, msg='') => {
  loadEl.classList.toggle('hide', !show);
  if (msg) loadSub.textContent = msg;
};
const fmt = b => b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
const showToast = msg => {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display='none', 3000);
};
const row = (k, v) => `<div class="prop-row"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;

// Init Three.js
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e1a);

  const rect = canvas.parentElement.getBoundingClientRect();
  camera = new THREE.PerspectiveCamera(60, rect.width/rect.height, 0.01, 5000);
  camera.position.set(15, 15, 15);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(rect.width, rect.height, false);

  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 0.9);
  sun.position.set(10, 20, 10);
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xeaf0ff, 0x2a364a, 0.4));
  scene.add(new THREE.GridHelper(50, 50, 0x224466, 0x112233));

  ifcLoader = new IFCLoader();
  ifcLoader.ifcManager.setWasmPath("https://cdn.jsdelivr.net/npm/web-ifc@0.0.44/");

  window.addEventListener('resize', onResize);
  onResize();
  animate();
  setStatus('g', 'Viewer ready — Open an IFC file');
}

function onResize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  if (!rect.width || !rect.height) return;
  camera.aspect = rect.width / rect.height;
  camera.updateProjectionMatrix();
  renderer.setSize(rect.width, rect.height, false);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// Load IFC
async function loadIFC(file) {
  if (!scene) initScene();
  if (ifcModel) {
    scene.remove(ifcModel);
    ifcModel.traverse(o => {
      o.geometry?.dispose();
      if (o.material) {
        Array.isArray(o.material) ? o.material.forEach(m => m.dispose()) : o.material.dispose();
      }
    });
    ifcModel = null;
  }

  showLoad(true, 'Parsing IFC geometry...');
  emptyEl.classList.add('hide');
  setStatus('y', `Loading ${file.name}...`);

  try {
    const url = URL.createObjectURL(file);
    ifcModel = await ifcLoader.loadAsync(url, xhr => {
      if (xhr.total) {
        const pct = ((xhr.loaded / xhr.total) * 100).toFixed(0);
        showLoad(true, `Loading geometry... ${pct}%`);
      }
    });
    URL.revokeObjectURL(url);
    modelID = ifcModel.modelID;
    scene.add(ifcModel);
    fitCameraToObj(ifcModel);

    fName.textContent = file.name;
    fSize.textContent = fmt(file.size);
    filePill.classList.add('show');
    uploadZone.style.display = 'none';
    topTitle.textContent = file.name;

    showLoad(true, 'Extracting data...');
    await extractData();
    renderSidebar();
    importBtn.classList.add('show');
    showLoad(false);

    setStatus('g', `✅ ${file.name} — ${ifcData.floors.length} floors, ${ifcData.spaces.length} spaces`);
  } catch(err) {
    showLoad(false);
    setStatus('r', `❌ ${err.message}`);
    console.error(err);
  }
}

function fitCameraToObj(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = (maxDim / 2) / Math.tan((camera.fov * Math.PI / 180) / 2) * 1.8;
  camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
  controls.target.copy(center);
  controls.update();
}

async function extractData() {
  ifcData = { floors:[], spaces:[], walls:[], slabs:[] };
  const mgr = ifcLoader.ifcManager;
  const IFCBUILDINGSTOREY = 3124254112;
  const IFCSPACE = 3856911033;
  const IFCWALL = 2391406946;
  const IFCWALLSTANDARDCASE = 477021311;
  const IFCSLAB = 1529196076;

  try {
    const ids = await mgr.getAllItemsOfType(modelID, IFCBUILDINGSTOREY, false);
    for (const id of ids) {
      const p = await mgr.getItemProperties(modelID, id);
      ifcData.floors.push({ id, name: p.Name?.value || `Floor ${id}` });
    }
  } catch(e) {}

  try {
    const ids = await mgr.getAllItemsOfType(modelID, IFCSPACE, false);
    for (const id of ids) {
      const p = await mgr.getItemProperties(modelID, id);
      ifcData.spaces.push({ id, name: p.Name?.value || p.LongName?.value || `Space ${id}` });
    }
  } catch(e) {}

  try {
    const w1 = await mgr.getAllItemsOfType(modelID, IFCWALL, false);
    const w2 = await mgr.getAllItemsOfType(modelID, IFCWALLSTANDARDCASE, false);
    for (const id of [...w1, ...w2]) {
      const p = await mgr.getItemProperties(modelID, id);
      ifcData.walls.push({ id, name: p.Name?.value || `Wall ${id}` });
    }
  } catch(e) {}

  try {
    const ids = await mgr.getAllItemsOfType(modelID, IFCSLAB, false);
    for (const id of ids) {
      const p = await mgr.getItemProperties(modelID, id);
      ifcData.slabs.push({ id, name: p.Name?.value || `Slab ${id}` });
    }
  } catch(e) {}
}

function renderSidebar() {
  const { floors, spaces, walls, slabs } = ifcData;
  let html = '';
  html += `<div class="sec-head">🏢 Model Summary</div>`;
  html += row('Floors', floors.length);
  html += row('Spaces', spaces.length);
  html += row('Walls', walls.length);
  html += row('Slabs', slabs.length);

  if (floors.length > 0 || spaces.length > 0) {
    html += `<div class="sec-head" style="margin-top:14px;">🏬 Floors & Spaces</div>`;
    html += `<div style="font-size:0.7rem;color:#aab3c6;margin-bottom:8px;">Select rooms to import</div>`;

    if (floors.length > 0) {
      for (const floor of floors) {
        html += `<div class="floor-label">📐 ${floor.name}</div>`;
        for (const sp of spaces) {
          const sel = selectedRooms.has(sp.id);
          html += `
            <div class="room-item ${sel?'sel':''}" onclick="window.toggleRoom(${sp.id})">
              <span>${sel?'✅':'⬜'}</span>
              <div>
                <div class="room-name">${sp.name}</div>
                <div class="room-meta">IfcSpace #${sp.id}</div>
              </div>
            </div>`;
        }
        break;
      }
    } else {
      html += `<div class="floor-label">📐 Ground Floor</div>`;
      for (const sp of spaces) {
        const sel = selectedRooms.has(sp.id);
        html += `
          <div class="room-item ${sel?'sel':''}" onclick="window.toggleRoom(${sp.id})">
            <span>${sel?'✅':'⬜'}</span>
            <div>
              <div class="room-name">${sp.name}</div>
              <div class="room-meta">IfcSpace #${sp.id}</div>
            </div>
          </div>`;
      }
    }
  }

  sbScroll.innerHTML = html;
  updateImportBtn();
}

window.toggleRoom = id => {
  selectedRooms.has(id) ? selectedRooms.delete(id) : selectedRooms.add(id);
  renderSidebar();
};

function updateImportBtn() {
  const n = selectedRooms.size;
  importBtn.textContent = n > 0
    ? `🚀 Import ${n} Room${n>1?'s':''} to LCA Tool`
    : `🚀 Import All Rooms to LCA Tool`;
}

importBtn.addEventListener('click', () => {
  const spaces = selectedRooms.size > 0
    ? ifcData.spaces.filter(s => selectedRooms.has(s.id))
    : ifcData.spaces;

  if (spaces.length === 0) {
    showToast('⚠️ No rooms to import');
    return;
  }

  const floors = ifcData.floors.length > 0 ? ifcData.floors : [{ id:'f0', name:'Ground Floor' }];

  const payload = {
    type: 'IFC_IMPORT',
    building: {
      name: topTitle.textContent.replace(/\.ifc$/i,'') || 'IFC Building',
      location: '',
      projectType: 'office',
      floors: floors.map((floor, fi) => ({
        id: `floor-ifc-${fi}`,
        name: floor.name,
        rooms: spaces.map((sp, ri) => ({
          id: `room-ifc-${fi}-${ri}`,
          name: sp.name,
          dims: { length: 5, width: 5, height: 2.7 },
          fromIFC: true,
          ifcId: sp.id
        }))
      }))
    }
  };

  localStorage.setItem('lindner-ifc-import', JSON.stringify(payload));
  showToast(`✅ Importing ${spaces.length} rooms...`);
  setTimeout(() => { window.location.href = './index.html?from=ifc'; }, 1200);
});

document.getElementById('btnFit').onclick = () => { if (ifcModel) fitCameraToObj(ifcModel); };

document.getElementById('btnWire').onclick = function() {
  if (!ifcModel) return;
  isWireframe = !isWireframe;
  ifcModel.traverse(o => {
    if (!o.isMesh) return;
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach(m => m.wireframe = isWireframe);
  });
  this.classList.toggle('active', isWireframe);
};

document.getElementById('btnXray').onclick = function() {
  if (!ifcModel) return;
  isXray = !isXray;
  ifcModel.traverse(o => {
    if (!o.isMesh) return;
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach(m => {
      m.transparent = isXray;
      m.opacity = isXray ? 0.25 : 1;
      m.depthWrite = !isXray;
    });
  });
  this.classList.toggle('active', isXray);
};

const flyTo = (eye, target) => {
  camera.position.set(...eye);
  controls.target.set(...target);
  controls.update();
};

document.getElementById('tTop').onclick = () => {
  if (!ifcModel) return;
  const b = new THREE.Box3().setFromObject(ifcModel);
  const c = b.getCenter(new THREE.Vector3());
  const s = b.getSize(new THREE.Vector3());
  flyTo([c.x, c.y + Math.max(s.x,s.z)*2, c.z], [c.x, c.y, c.z]);
};
document.getElementById('tFront').onclick = () => {
  if (!ifcModel) return;
  const b = new THREE.Box3().setFromObject(ifcModel);
  const c = b.getCenter(new THREE.Vector3());
  const s = b.getSize(new THREE.Vector3());
  flyTo([c.x, c.y, c.z + Math.max(s.x,s.y)*2], [c.x, c.y, c.z]);
};
document.getElementById('tRight').onclick = () => {
  if (!ifcModel) return;
  const b = new THREE.Box3().setFromObject(ifcModel);
  const c = b.getCenter(new THREE.Vector3());
  const s = b.getSize(new THREE.Vector3());
  flyTo([c.x + Math.max(s.y,s.z)*2, c.y, c.z], [c.x, c.y, c.z]);
};
document.getElementById('t3D').onclick = () => { if (ifcModel) fitCameraToObj(ifcModel); };

document.getElementById('ifcIn').onchange = e => {
  if (e.target.files[0]) loadIFC(e.target.files[0]);
};
uploadZone.onclick = () => document.getElementById('ifcIn').click();
uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('drag'); };
uploadZone.ondragleave = () => uploadZone.classList.remove('drag');
uploadZone.ondrop = e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f?.name.toLowerCase().endsWith('.ifc')) loadIFC(f);
};

initScene();
</script>
</body>
</html>
